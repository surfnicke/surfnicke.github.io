<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis Court Watering Log</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            padding-top: 50px;
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin: 5px;
            transition: background-color 0.3s ease;
        }

        #logWateringBtn {
            background-color: #4CAF50;
            color: white;
        }

        #logWateringBtn:hover {
            background-color: #45a049;
        }

        .nameBtn {
            background-color: #008CBA;
            color: white;
        }

        .nameBtn:hover {
            background-color: #007bb5;
        }

        #nameSelection p {
            font-size: 16px;
            margin-bottom: 15px;
            color: #555;
        }

        #logMessage {
            color: #333;
            font-size: 1.1em;
            margin-top: 20px;
        }

        #historySection {
            margin-top: 25px;
            text-align: left;
        }

        #historySection h2 {
            font-size: 18px;
            margin: 0 0 10px;
            color: #333;
        }

        #historyList {
            list-style: none;
            padding: 0;
            margin: 0;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            max-height: 220px;
            overflow-y: auto;
        }

        #historyList li {
            padding: 10px 12px;
            border-bottom: 1px solid #efefef;
            font-size: 14px;
            color: #333;
        }

        #historyList li:last-child {
            border-bottom: none;
        }

        #downloadHistoryBtn {
            background-color: #2c3e50;
            color: white;
            font-size: 14px;
            padding: 8px 14px;
            margin-top: 10px;
        }

        #downloadHistoryBtn:hover {
            background-color: #1f2d3a;
        }

        .emptyHistory {
            color: #777;
            font-style: italic;
        }

        #lockScreen {
            position: fixed;
            inset: 0;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #lockBox {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 280px;
        }

        #lockBox h2 {
            margin: 0 0 20px;
            color: #333;
            font-size: 20px;
        }

        #lockError {
            color: #c0392b;
            font-size: 13px;
            min-height: 18px;
            margin-bottom: 8px;
        }

        #passwordInput {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            margin-bottom: 12px;
        }

        #passwordInput.shake {
            animation: shake 0.3s ease;
            border-color: #c0392b;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        #unlockBtn {
            background-color: #4CAF50;
            color: white;
            width: 100%;
            padding: 10px;
            font-size: 16px;
        }

        #unlockBtn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div id="lockScreen">
        <div id="lockBox">
            <h2>Ange lösenord</h2>
            <input id="passwordInput" type="password" placeholder="Lösenord" autocomplete="current-password" />
            <p id="lockError"></p>
            <button id="unlockBtn" type="button">Lås upp</button>
        </div>
    </div>

    <div class="container" id="appContainer" style="display: none;">
        <h1>Det bästa sommarjobbet</h1>

        <button id="logWateringBtn">Vattnat!</button>

        <div id="nameSelection" style="display: none;">
            <p>Vem vattnade?</p>
            <button class="nameBtn" data-name="Hubert">Hubert</button>
            <button class="nameBtn" data-name="Freja">Freja</button>
            <button class="nameBtn" data-name="Wilgot">Wilgot</button>
        </div>

        <div id="logMessage"></div>

        <div id="historySection">
            <h2>Historik</h2>
            <ul id="historyList"></ul>
            <button id="downloadHistoryBtn" type="button">Ladda ner historik (.txt)</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const PASSWORD_HASH = 'e7111e6ca725551fe9ade54ef6b38d9aa7fd362d9ade85a984fd6e84ce04dbdd';
            const MAX_ATTEMPTS = 5;
            const LOCKOUT_MS = 30000;
            const lockScreen = document.getElementById('lockScreen');
            const appContainer = document.getElementById('appContainer');
            const passwordInput = document.getElementById('passwordInput');
            const unlockBtn = document.getElementById('unlockBtn');
            const lockError = document.getElementById('lockError');

            let failedAttempts = 0;
            let lockedUntil = 0;

            if (sessionStorage.getItem('unlocked') === '1') {
                lockScreen.style.display = 'none';
                appContainer.style.display = 'block';
            }

            const hashPassword = async (password) => {
                const encoder = new TextEncoder();
                const data = encoder.encode(password);
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                return Array.from(new Uint8Array(hashBuffer))
                    .map((b) => b.toString(16).padStart(2, '0'))
                    .join('');
            };

            const unlock = async () => {
                const now = Date.now();

                if (now < lockedUntil) {
                    const secs = Math.ceil((lockedUntil - now) / 1000);
                    lockError.textContent = `För många försök. Vänta ${secs}s.`;
                    return;
                }

                const hash = await hashPassword(passwordInput.value);
                passwordInput.value = '';

                if (hash === PASSWORD_HASH) {
                    sessionStorage.setItem('unlocked', '1');
                    lockScreen.style.display = 'none';
                    appContainer.style.display = 'block';
                } else {
                    failedAttempts++;
                    passwordInput.classList.remove('shake');
                    void passwordInput.offsetWidth;
                    passwordInput.classList.add('shake');

                    if (failedAttempts >= MAX_ATTEMPTS) {
                        lockedUntil = Date.now() + LOCKOUT_MS;
                        failedAttempts = 0;
                        lockError.textContent = 'För många försök. Vänta 30s.';
                    } else {
                        lockError.textContent = `Fel lösenord. (${MAX_ATTEMPTS - failedAttempts} försök kvar)`;
                    }

                    passwordInput.focus();
                }
            };

            unlockBtn.addEventListener('click', unlock);
            passwordInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    unlock();
                }
            });

            if (lockScreen.style.display !== 'none') {
                passwordInput.focus();
            }

            const STORAGE_KEY = 'wateringLogEntries';
            const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzkY1n5o32KKtXoiSnap9j8-kKXBPYmuAG-XP1Angiy_-SwAmzWmy1lXF-EZ_rf7MLZ/exec';
            const logWateringBtn = document.getElementById('logWateringBtn');
            const nameSelectionDiv = document.getElementById('nameSelection');
            const nameButtons = document.querySelectorAll('.nameBtn');
            const logMessageDiv = document.getElementById('logMessage');
            const historyList = document.getElementById('historyList');
            const downloadHistoryBtn = document.getElementById('downloadHistoryBtn');

            const loadHistory = () => {
                const rawHistory = localStorage.getItem(STORAGE_KEY);
                if (!rawHistory) {
                    return [];
                }

                try {
                    const parsed = JSON.parse(rawHistory);
                    return Array.isArray(parsed) ? parsed : [];
                } catch (error) {
                    return [];
                }
            };

            const saveHistory = (entries) => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
            };

            const syncEntryToGoogle = async (entry) => {
                if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes('PASTE_YOUR_DEPLOYED')) {
                    return;
                }

                const params = new URLSearchParams({
                    name: entry.name,
                    timestamp: entry.timestamp,
                    _: Date.now().toString()
                });

                await fetch(`${GOOGLE_SCRIPT_URL}?${params.toString()}`, {
                    method: 'GET',
                    mode: 'no-cors',
                    cache: 'no-store'
                });
            };

            const formatEntry = (entry) => {
                const date = new Date(entry.timestamp);
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                const formattedDate = date.toLocaleDateString('sv-SE', options);
                const formattedTime = date.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
                return `${entry.name} vattnade den ${formattedDate} kl. ${formattedTime}.`;
            };

            const renderHistory = (entries) => {
                historyList.innerHTML = '';

                if (entries.length === 0) {
                    const emptyItem = document.createElement('li');
                    emptyItem.className = 'emptyHistory';
                    emptyItem.textContent = 'Ingen vattning loggad ännu.';
                    historyList.appendChild(emptyItem);
                    return;
                }

                entries.forEach((entry) => {
                    const listItem = document.createElement('li');
                    listItem.textContent = formatEntry(entry);
                    historyList.appendChild(listItem);
                });
            };

            const buildHistoryText = (entries) => {
                if (entries.length === 0) {
                    return 'Ingen vattning loggad ännu.';
                }

                return entries.map((entry) => formatEntry(entry)).join('\n');
            };

            const downloadHistoryAsText = (entries) => {
                const today = new Date();
                const dateStamp = today.toISOString().slice(0, 10);
                const fileName = `vattningshistorik-${dateStamp}.txt`;
                const fileContent = `${buildHistoryText(entries)}\n`;
                const blob = new Blob([fileContent], { type: 'text/plain;charset=utf-8' });
                const downloadUrl = URL.createObjectURL(blob);
                const tempLink = document.createElement('a');

                tempLink.href = downloadUrl;
                tempLink.download = fileName;
                tempLink.style.display = 'none';
                document.body.appendChild(tempLink);
                tempLink.click();
                document.body.removeChild(tempLink);
                URL.revokeObjectURL(downloadUrl);
            };

            let wateringHistory = loadHistory();
            renderHistory(wateringHistory);

            logWateringBtn.addEventListener('click', () => {
                logWateringBtn.style.display = 'none';
                nameSelectionDiv.style.display = 'block';
                logMessageDiv.textContent = ''; // Clear previous message
            });

            nameButtons.forEach((button) => {
                button.addEventListener('click', async (event) => {
                    const selectedName = event.target.dataset.name;
                    if (!selectedName) {
                        return;
                    }

                    let syncSucceeded = false;

                    const newEntry = {
                        name: selectedName,
                        timestamp: new Date().toISOString()
                    };

                    wateringHistory.unshift(newEntry);
                    saveHistory(wateringHistory);
                    renderHistory(wateringHistory);

                    try {
                        await syncEntryToGoogle(newEntry);
                        syncSucceeded = true;
                    } catch (error) {
                        syncSucceeded = false;
                    }

                    const latestEntry = wateringHistory[0];

                    nameSelectionDiv.style.display = 'none';
                    if (latestEntry) {
                        logMessageDiv.textContent = `${formatEntry(latestEntry)} ${syncSucceeded ? 'Google-synk: OK.' : 'Google-synk: misslyckades.'}`;
                    } else {
                        logMessageDiv.textContent = `${selectedName} vattnade. ${syncSucceeded ? 'Google-synk: OK.' : 'Google-synk: misslyckades.'}`;
                    }
                    logWateringBtn.style.display = 'block'; // Show the main button again for new entry
                });
            });

            downloadHistoryBtn.addEventListener('click', () => {
                downloadHistoryAsText(wateringHistory);
            });

        });
    </script>
</body>
</html>
